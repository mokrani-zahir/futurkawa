server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # env-config.js is regenerated at container startup — never cache it.
    location = /env-config.js {
        add_header Cache-Control "no-store";
    }

    # React Router SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
