# Used by docker-compose.prod.yml. Fronts the Laravel API only — the
# frontend is a fully independent container/image in production, reached by
# the browser directly (its own .env carries the backend URL), not proxied
# through here.
server {
    listen 80;

    location ~ ^/(api|up)(/|$) {
        fastcgi_pass         laravel:9000;
        fastcgi_param        SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param        REQUEST_URI     $request_uri;
        fastcgi_param        QUERY_STRING    $query_string;
        fastcgi_param        REQUEST_METHOD  $request_method;
        fastcgi_param        CONTENT_TYPE    $content_type;
        fastcgi_param        CONTENT_LENGTH  $content_length;
        include              fastcgi_params;
        fastcgi_read_timeout 300;
    }
}
