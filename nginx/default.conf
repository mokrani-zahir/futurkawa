# Map $http_upgrade so regular HTTP gets Connection: close,
# while WebSocket upgrade requests get Connection: upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # ── Laravel API & health endpoint ─────────────────────────────────────────
    location ~ ^/(api|up)(/|$) {
        fastcgi_pass         laravel:9000;
        fastcgi_param        SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param        REQUEST_URI     $request_uri;
        fastcgi_param        QUERY_STRING    $query_string;
        fastcgi_param        REQUEST_METHOD  $request_method;
        fastcgi_param        CONTENT_TYPE    $content_type;
        fastcgi_param        CONTENT_LENGTH  $content_length;
        include              fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # ── React SPA (Vite dev-server — everything else) ─────────────────────────
    location / {
        proxy_pass          http://frontend:5173;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_cache_bypass  $http_upgrade;
        # Prevent nginx from buffering SSE / HMR streams
        proxy_buffering     off;
    }
}
