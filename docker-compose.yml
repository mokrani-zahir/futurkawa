services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - laravel
      - frontend
    restart: unless-stopped

  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      # Only our custom source files are bind-mounted on top of the image's
      # full Laravel installation. artisan, vendor, public, etc. stay in the
      # container filesystem (rebuilt with docker-compose build).
      - ./backend/app:/var/www/html/app
      - ./backend/database/migrations:/var/www/html/database/migrations
      - ./backend/database/seeders:/var/www/html/database/seeders
      - ./backend/routes:/var/www/html/routes
      - ./backend/bootstrap/app.php:/var/www/html/bootstrap/app.php
      - ./backend/resources/views:/var/www/html/resources/views
      - ./backend/config/futurekawa.php:/var/www/html/config/futurekawa.php
      # Persist logs and uploaded files across restarts
      - storage_data:/var/www/html/storage
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - node_modules_data:/app/node_modules
    environment:
      - VITE_API_URL=/api
    ports:
      - "5173:5173"
    restart: unless-stopped

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - storage_data:/var/www/html/storage
    env_file:
      - .env
    depends_on:
      - laravel
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - storage_data:/var/www/html/storage
    env_file:
      - .env
    depends_on:
      - laravel
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-futurekawa}
      POSTGRES_USER: ${DB_USERNAME:-futurekawa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-futurekawa} -d ${DB_DATABASE:-futurekawa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  storage_data:
  node_modules_data:
